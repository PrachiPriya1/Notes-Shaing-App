<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Register - Student Notes Sharing Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #007bff, #00b4d8);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .auth-box {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      padding: 45px 35px;
      border-radius: 25px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      transition: all 0.5s ease;
    }

    .auth-box h2 {
      font-weight: 700;
      color: #007bff;
      text-align: center;
      margin-bottom: 25px;
    }

    .input-group-text {
      background-color: #f0f5ff;
      border: none;
      border-top-left-radius: 10px;
      border-bottom-left-radius: 10px;
      color: #007bff;
      font-size: 1.2rem;
    }

    .form-control {
      border: none;
      background-color: #f0f5ff;
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
      padding-left: 5px;
    }

    .form-control:focus {
      box-shadow: none;
      border: 1px solid #007bff;
    }

    .btn-custom {
      background-color: #007bff;
      color: white;
      border-radius: 30px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #0056b3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .toggle-btns {
      text-align: center;
      margin-bottom: 25px;
    }

    .toggle-btns button {
      border: none;
      background: transparent;
      font-weight: 600;
      color: #007bff;
      font-size: 1rem;
      margin: 0 10px;
      cursor: pointer;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .toggle-btns button.active {
      color: #0056b3;
      border-bottom: 2px solid #0056b3;
    }

    .form-section {
      display: none;
      animation: fadeIn 0.6s ease;
    }

    .form-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .small-text {
      font-size: 0.9rem;
      text-align: center;
      margin-top: 15px;
    }

    footer {
      position: absolute;
      bottom: 15px;
      text-align: center;
      width: 100%;
      color: #fff;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="auth-box shadow-lg">
    <div class="toggle-btns">
      <button id="loginBtn" class="active">Login</button>
      <button id="registerBtn">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form-section active">
      <h2><i class="bi bi-box-arrow-in-right me-2"></i>Student Login</h2>
      <form action="login.php" method="POST">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter your email address" required>
        </div>
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-custom w-100 mt-2"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
      </form>
      <p class="small-text mt-3">Don’t have an account? <a href="#" id="switchToRegister">Register</a></p>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form-section">
      <h2><i class="bi bi-person-plus-fill me-2"></i>Student Registration</h2>
      <form action="register.php" method="POST">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
        </div>
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter your email address" required>
        </div>
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="Password" class="form-control" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-custom w-100 mt-2"><i class="bi bi-person-plus me-2"></i>Register</button>
      </form>
      <p class="small-text mt-3">Already have an account? <a href="#" id="switchToLogin">Login</a></p>
    </div>
  </div>

  <footer>
    &copy; 2025 Student Notes Sharing Portal | Designed with 💙 for Students
  </footer>

  <script>
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const switchToLogin = document.getElementById("switchToLogin");
    const switchToRegister = document.getElementById("switchToRegister");

    function showLogin() {
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
      loginBtn.classList.add("active");
      registerBtn.classList.remove("active");
    }

    function showRegister() {
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
      registerBtn.classList.add("active");
      loginBtn.classList.remove("active");
    }

    loginBtn.addEventListener("click", showLogin);
    registerBtn.addEventListener("click", showRegister);
    switchToLogin.addEventListener("click", showLogin);
    switchToRegister.addEventListener("click", showRegister);
  </script>

</body>
</html>
